<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ANUCENTERPRISE | Plastic Varieties</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--primary:#0b2c48;
--accent:#2bb3c0;
--bg:#ffffff;
--text:#333;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins}

body{
background:var(--bg);
color:var(--text);
}

header{
background:var(--primary);
color:white;
padding:15px;
text-align:center;
}

header h1{
font-size:22px;
}

header p{
font-size:14px;
opacity:.8;
}

.container{
max-width:1100px;
margin:auto;
padding:15px;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filter-btn{
padding:8px 14px;
border:none;
background:#eee;
border-radius:20px;
cursor:pointer;
}

.filter-btn.active{
background:var(--accent);
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.card{
border:1px solid #eee;
border-radius:10px;
padding:10px;
text-align:center;
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
border-radius:8px;
}

.card h3{
font-size:14px;
margin-top:5px;
}

.price{
font-weight:600;
color:var(--primary);
}

button.add{
margin-top:6px;
padding:6px 10px;
border:none;
background:var(--accent);
color:white;
border-radius:5px;
cursor:pointer;
}

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:var(--primary);
color:white;
padding:12px 16px;
border-radius:30px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.cart-modal{
position:fixed;
top:0;
right:-100%;
width:100%;
max-width:420px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,.1);
transition:.3s;
padding:15px;
overflow:auto;
}

.cart-modal.open{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.qty{
display:flex;
gap:5px;
}

.qty button{
width:25px;
height:25px;
border:none;
background:#ddd;
cursor:pointer;
}

.total{
font-weight:600;
margin:10px 0;
}

.checkout{
background:var(--accent);
border:none;
padding:10px;
color:white;
width:100%;
border-radius:6px;
cursor:pointer;
}

form input,form textarea{
width:100%;
padding:8px;
margin-bottom:8px;
border:1px solid #ddd;
border-radius:4px;
}

.whatsapp{
position:fixed;
left:20px;
bottom:20px;
background:#25d366;
color:white;
padding:10px 16px;
border-radius:30px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<h1>ANUCENTERPRISE</h1>
<p>Plastic Varieties | Rajkot, Gujarat</p>
</header>

<div class="container">

<div class="filters">
<button class="filter-btn active" onclick="filter('all')">All</button>
<button class="filter-btn" onclick="filter('Wall Mounted')">Wall Mounted</button>
</div>

<div class="grid" id="products"></div>

</div>

<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart-modal" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total">Total: ₹<span id="total">0</span></div>

<button class="checkout" onclick="showForm()">Place Order</button>

<div id="orderForm" style="display:none;margin-top:10px;">

<form action="https://formspree.io/f/mdawlgjp" method="POST" onsubmit="prepareOrder()">

<input name="Customer Name" required placeholder="Your Name">

<input name="Phone Number" required placeholder="Phone Number">

<textarea name="Address" required placeholder="Delivery Address"></textarea>

<textarea name="Instructions" placeholder="Special instructions"></textarea>

<input type="hidden" name="Order Summary" id="orderSummary">

<button class="checkout">Submit Order</button>

</form>

</div>

</div>

<a class="whatsapp" href="https://wa.me/919409773955">Chat on WhatsApp</a>

<script>

const products=[
{id:1,name:"Wall Mounted Cabinet 1",price:700,category:"Wall Mounted",img:"https://i.ibb.co/8gQRgxPX/Wall-Mounted.png",desc:"Dark wall-mounted plastic cabinet"},
{id:2,name:"Wall Mounted Cabinet 2",price:700,category:"Wall Mounted",img:"https://i.ibb.co/8gQRgxPX/Wall-Mounted.png",desc:"Strong storage cabinet"},
{id:3,name:"Wall Mounted Cabinet 3",price:700,category:"Wall Mounted",img:"https://i.ibb.co/8gQRgxPX/Wall-Mounted.png",desc:"Plastic home organizer"},
{id:4,name:"Wall Mounted Cabinet 4",price:700,category:"Wall Mounted",img:"https://i.ibb.co/8gQRgxPX/Wall-Mounted.png",desc:"Two door storage box"},
{id:5,name:"Wall Mounted Cabinet 5",price:700,category:"Wall Mounted",img:"https://i.ibb.co/8gQRgxPX/Wall-Mounted.png",desc:"Wall utility storage"},
{id:6,name:"Wall Mounted Cabinet 6",price:700,category:"Wall Mounted",img:"https://i.ibb.co/8gQRgxPX/Wall-Mounted.png",desc:"Plastic wall shelf"},
{id:7,name:"Wall Mounted Cabinet 7",price:700,category:"Wall Mounted",img:"https://i.ibb.co/8gQRgxPX/Wall-Mounted.png",desc:"Home wall organizer"},
{id:8,name:"Wall Mounted Cabinet 8",price:700,category:"Wall Mounted",img:"https://i.ibb.co/8gQRgxPX/Wall-Mounted.png",desc:"Compact storage cabinet"}
]

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function renderProducts(list){

let html=""

list.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}" loading="lazy" alt="${p.name}">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>
<button class="add" onclick="add(${p.id})">Add to Cart</button>
</div>
`
})

document.getElementById("products").innerHTML=html

}

renderProducts(products)

function filter(cat){

if(cat=="all") renderProducts(products)
else renderProducts(products.filter(p=>p.category==cat))

}

function add(id){

let item=cart.find(i=>i.id==id)

if(item) item.qty++
else cart.push({id,qty:1})

save()

}

function save(){

localStorage.setItem("cart",JSON.stringify(cart))
updateCart()

}

function updateCart(){

let html=""
let total=0
let count=0

cart.forEach(i=>{

let p=products.find(p=>p.id==i.id)
let sub=p.price*i.qty

total+=sub
count+=i.qty

html+=`
<div class="cart-item">
<div>${p.name}<br>₹${p.price}</div>
<div class="qty">
<button onclick="change(${i.id},-1)">-</button>
${i.qty}
<button onclick="change(${i.id},1)">+</button>
</div>
</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total
document.getElementById("count").innerText=count

}

function change(id,delta){

let item=cart.find(i=>i.id==id)

item.qty+=delta

if(item.qty<=0) cart=cart.filter(i=>i.id!=id)

save()

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open")

}

function showForm(){

document.getElementById("orderForm").style.display="block"

}

function prepareOrder(){

let summary=""

cart.forEach(i=>{
let p=products.find(p=>p.id==i.id)
summary+=`${p.name} x ${i.qty} = ₹${p.price*i.qty}\n`
})

summary+="Total: ₹"+document.getElementById("total").innerText

document.getElementById("orderSummary").value=summary

localStorage.removeItem("cart")

alert("Order placed! ANUCENTERPRISE will contact you on WhatsApp to confirm.")

}

updateCart()

</script>

</body>
</html>
